services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: goal_manager
      MYSQL_USER: goal
      MYSQL_PASSWORD: goal
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      APP_LISTEN_ADDR: ":8080"
      MYSQL_DSN: goal:goal@tcp(mysql:3306)/goal_manager?parseTime=true
      REDIS_ADDR: redis:6379
      APP_DEFAULT_LOCALE: zh-CN
      STORAGE_BACKEND: mysql
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
